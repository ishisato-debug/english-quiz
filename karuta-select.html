<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>えいたんご えらぼう</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            text-align: center;
            background-color: #fffaf0;
            background-image: radial-gradient(#ffdfba 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        h1 {
            color: #ff69b4;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 1px 1px white;
        }
        .lead {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 36px;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: stretch;
            max-width: 480px;
            margin: 0 auto;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 30px 20px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15);
            transition: 0.1s;
            box-sizing: border-box;
            color: white;
        }
        .menu-btn:active { box-shadow: none; transform: translateY(8px); }
        .btn-purple {
            background-color: #c780ff;
        }
        .btn-red {
            background-color: #ff4f4f;
        }
        .subtitle {
            font-size: 14px;
            opacity: 0.85;
            margin-top: 6px;
            line-height: 1.3;
            display: block;
        }
        .btn-home {
            display: inline-block;
            margin-top: 36px;
            background: #fff;
            color: #ff69b4;
            border: 2px solid #ffb6c1;
            font-size: 1rem;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <h1>🃏 えいたんご</h1>
    <p class="lead">シリーズをえらんでね！</p>
    <div class="menu">
        <a class="menu-btn btn-purple" href="karuta.html">
            💜 えいたんごpurple<br>
            <span class="subtitle">たんごシリーズ1</span>
        </a>
        <a class="menu-btn btn-red" href="karuta-red.html">
            ❤️ えいたんごred<br>
            <span class="subtitle">たんごシリーズ2</span>
        </a>
    </div>
    <a class="btn-home" href="index.html">🏠 ホーム</a>
</body>
</html>
