<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えいたんごpurple</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #f9fbe7);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  h1 {
    font-size: 2.2rem;
    color: #9c27b0;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 0.1em;
  }

  #progress-wrap {
    font-size: 1.1rem;
    color: #888;
    margin-bottom: 20px;
  }

  #progress-bar-wrap {
    width: 100%;
    max-width: 480px;
    height: 12px;
    background: #e0e0e0;
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #c780ff, #e040fb);
    border-radius: 8px;
    transition: width 0.4s;
    width: 0%;
  }

  #word-card {
    background: white;
    border-radius: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    width: 100%;
    max-width: 480px;
    padding: 50px 30px 36px;
    text-align: center;
    margin-bottom: 20px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    user-select: none;
  }
  #word-card:active {
    transform: scale(0.97);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  #word-display {
    font-size: 4rem;
    font-weight: bold;
    color: #333;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  #word-display.placeholder {
    font-size: 2.2rem;
    white-space: normal;
  }

  #word-number {
    font-size: 1rem;
    color: #aaa;
    margin-top: 12px;
  }

  #card-hint {
    font-size: 0.85rem;
    color: #bbb;
    margin-top: 10px;
  }

  /* back / next ボタン行 */
  .nav-row {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  .nav-row button {
    flex: 1;
    font-size: 1.6rem;
    font-weight: bold;
    padding: 20px 0;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.1s, box-shadow 0.1s;
    line-height: 1.2;
  }
  .nav-row button:active { transform: scale(0.95); }

  #btn-back {
    background: #90caf9;
    color: white;
    box-shadow: 0 6px 0 #42a5f5;
  }
  #btn-back:disabled {
    background: #ddd;
    box-shadow: 0 6px 0 #bbb;
    cursor: default;
  }

  #btn-next {
    background: #c780ff;
    color: white;
    box-shadow: 0 6px 0 #7b1fa2;
  }

  /* はじめから */
  #btn-reset {
    background: #aed581;
    color: white;
    font-size: 1.3rem;
    font-weight: bold;
    padding: 16px 40px;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 5px 0 #689f38;
    transition: transform 0.1s;
    margin-bottom: 16px;
  }
  #btn-reset:active { transform: scale(0.95); }

#finished-msg {
    display: none;
    font-size: 1.8rem;
    color: #4a90d9;
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
  }

  #btn-home {
    background: #fff;
    color: #ff69b4;
    border: 2px solid #ffb6c1;
    font-size: 1.1rem;
    font-weight: bold;
    padding: 10px 22px;
    border-radius: 20px;
    margin-bottom: 16px;
    box-shadow: none;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<h1>💜 えいたんごpurple</h1>

<div id="progress-wrap">のこり <span id="remaining">96</span> / 96 まい</div>

<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<div id="word-card" onclick="speakCurrent()">
  <div id="word-display" class="placeholder">ここに<br>たんごが<br>でてくるよ！</div>
  <div id="word-number"></div>
  <div id="card-hint"></div>
</div>

<div class="nav-row">
  <button id="btn-back" onclick="backWord()" disabled>◀ Back</button>
  <button id="btn-next" onclick="nextWord()">Next ▶</button>
</div>

<button id="btn-reset" onclick="resetAll()">はじめから 🔄</button>

<div id="finished-msg">🎉 ぜんぶ よんだよ！おつかれさま！<br>「はじめから」をおしてね</div>

<div style="text-align:center; margin-top:24px;">
  <button id="btn-home" onclick="location.href='karuta-select.html'">◀ シリーズえらぶ</button>
</div>

<script>
const allWords = "black/blanket/clock/club/broom/bride/crab/crocodile/fly/flag/globe/glass/frog/Friday/green/grass/plate/play/slide/sleep/drum/dress/truck/tree/smile/smoke/snake/snow/spoon/spot/swing/swim/stop/test/stamp/fast/shell/fish/ship/brush/chick/lunch/watch/catch/phone/dolphin/whale/white/this/that/mather/father/three/teeth/think/bath/duck/rocket/queen/quilt/king/long/bank/pink/wind/hand/tent/paint/belt/adult/lamp/camp/skunk/desk/scale/school/spray/spring/string/strong/splash/splint/squid/square/rice/city/ice cream/cell phone/giraffe/orange/giant/cage/rose/jeans/cheese/legs".split('/');

const totalCount = allWords.length;
let pool = [];       // まだ出ていない単語プール
let history = [];    // 表示した単語の履歴
let historyIndex = -1;
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1.1;
  window.speechSynthesis.speak(utter);
}

function speakCurrent() {
  if (historyIndex >= 0 && history.length > 0) {
    speak(history[historyIndex]);
  }
}

function updateUI() {
  const remaining = totalCount - history.length;
  document.getElementById('remaining').textContent = remaining;
  document.getElementById('progress-bar').style.width = (history.length / totalCount * 100) + '%';
  document.getElementById('btn-back').disabled = historyIndex <= 0;
}

function fitFontSize() {
  const wd = document.getElementById('word-display');
  const card = document.getElementById('word-card');
  const maxWidth = card.clientWidth - 60;
  let size = 64;
  wd.style.fontSize = size + 'px';
  while (wd.scrollWidth > maxWidth && size > 16) {
    size -= 2;
    wd.style.fontSize = size + 'px';
  }
}

function showWord(word, index) {
  const wd = document.getElementById('word-display');
  wd.classList.remove('placeholder');
  wd.style.whiteSpace = 'nowrap';
  wd.textContent = word;
  fitFontSize();
  document.getElementById('word-number').textContent = (index + 1) + ' / ' + totalCount;
  document.getElementById('card-hint').textContent = '🔊 タップで音声';
  document.getElementById('finished-msg').style.display = 'none';
  updateUI();
}

function nextWord() {
  // 履歴の途中にいる場合は前に進む
  if (historyIndex < history.length - 1) {
    historyIndex++;
    showWord(history[historyIndex], historyIndex);
    return;
  }
  // 新しい単語を出す
  if (pool.length === 0) {
    document.getElementById('word-display').textContent = '🎉 おわり！';
    document.getElementById('word-number').textContent = '';
    document.getElementById('card-hint').textContent = '';
    document.getElementById('finished-msg').style.display = 'block';
    updateUI();
    return;
  }
  const idx = Math.floor(Math.random() * pool.length);
  const word = pool.splice(idx, 1)[0];
  history.push(word);
  historyIndex++;
  showWord(word, historyIndex);
}

function backWord() {
  if (historyIndex > 0) {
    historyIndex--;
    showWord(history[historyIndex], historyIndex);
    updateUI();
  }
}

function resetAll() {
  pool = shuffle([...allWords]);
  history = [];
  historyIndex = -1;
  const wdReset = document.getElementById('word-display');
  wdReset.classList.add('placeholder');
  wdReset.textContent = 'ここにたんごがでてくるよ！';
  document.getElementById('word-number').textContent = '';
  document.getElementById('card-hint').textContent = '';
  document.getElementById('finished-msg').style.display = 'none';
  window.speechSynthesis && window.speechSynthesis.cancel();
  updateUI();
}

// 初期化
pool = shuffle([...allWords]);
updateUI();
</script>
</body>
</html>
