<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えいごかるた</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #f9fbe7);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  h1 {
    font-size: 2.2rem;
    color: #4a90d9;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 0.1em;
  }

  #progress-wrap {
    font-size: 1.1rem;
    color: #888;
    margin-bottom: 20px;
  }

  #word-card {
    background: white;
    border-radius: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    width: 100%;
    max-width: 480px;
    padding: 50px 30px;
    text-align: center;
    margin-bottom: 30px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #word-display {
    font-size: 4rem;
    font-weight: bold;
    color: #333;
    letter-spacing: 0.05em;
    word-break: break-all;
  }

  #word-number {
    font-size: 1rem;
    color: #aaa;
    margin-top: 12px;
  }

  .btn-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  button {
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    transition: transform 0.1s, box-shadow 0.1s;
    line-height: 1.3;
  }
  button:active { transform: scale(0.95); }

  #btn-next {
    background: #ff8c42;
    color: white;
    font-size: 2rem;
    padding: 24px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 6px 0 #c85e1a;
    border-radius: 24px;
    margin-bottom: 16px;
  }
  #btn-next:hover { background: #ff9f5e; }

  #btn-repeat {
    background: #4fc3f7;
    color: white;
    font-size: 1.4rem;
    padding: 18px 28px;
    flex: 1;
    box-shadow: 0 4px 0 #0288d1;
  }
  #btn-repeat:hover { background: #81d4fa; }

  #btn-reset {
    background: #aed581;
    color: white;
    font-size: 1.4rem;
    padding: 18px 28px;
    flex: 1;
    box-shadow: 0 4px 0 #689f38;
  }
  #btn-reset:hover { background: #c5e1a5; }

  #auto-section {
    background: white;
    border-radius: 20px;
    padding: 20px 28px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }

  #auto-section label {
    font-size: 1.3rem;
    color: #555;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    margin-bottom: 12px;
  }

  #auto-toggle {
    width: 52px;
    height: 28px;
    accent-color: #ff8c42;
    cursor: pointer;
    transform: scale(1.6);
    margin-right: 8px;
  }

  #interval-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
    color: #777;
  }

  #interval-slider {
    flex: 1;
    accent-color: #ff8c42;
    height: 6px;
  }

  #interval-label {
    font-weight: bold;
    color: #ff8c42;
    min-width: 40px;
  }

  #finished-msg {
    display: none;
    font-size: 1.8rem;
    color: #4a90d9;
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
  }

  #progress-bar-wrap {
    width: 100%;
    max-width: 480px;
    height: 12px;
    background: #e0e0e0;
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #ff8c42, #ffd54f);
    border-radius: 8px;
    transition: width 0.4s;
    width: 0%;
  }
</style>
</head>
<body>

<h1>🃏 えいごかるた</h1>

<div id="progress-wrap">のこり <span id="remaining">96</span> / 96 まい</div>

<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<div id="word-card">
  <div id="word-display">ここに たんごが でるよ！</div>
  <div id="word-number"></div>
</div>

<button id="btn-next" onclick="nextWord()">
  つぎの たんご 🔊<br><span style="font-size:1.2rem">Next Word</span>
</button>

<div class="btn-row">
  <button id="btn-repeat" onclick="repeatWord()">
    もういちど 🔁<br><span style="font-size:0.9rem">Repeat</span>
  </button>
  <button id="btn-reset" onclick="resetAll()">
    はじめから 🔄<br><span style="font-size:0.9rem">Reset</span>
  </button>
</div>

<div id="auto-section">
  <label>
    <input type="checkbox" id="auto-toggle" onchange="toggleAuto()">
    じどうモード（Auto）
  </label>
  <div id="interval-wrap">
    ⏱ かんかく：
    <input type="range" id="interval-slider" min="3" max="15" value="6" step="1" oninput="updateInterval()">
    <span id="interval-label">6びょう</span>
  </div>
</div>

<div id="finished-msg">🎉 ぜんぶ よんだよ！おつかれさま！<br>「はじめから」をおしてね</div>

<script>
const words = "black/blanket/clock/club/broom/bride/crab/crocodile/fly/flag/globe/glass/frog/Friday/green/grass/plate/play/slide/sleep/drum/dress/truck/tree/smile/smoke/snake/snow/spoon/spot/swing/swim/stop/test/stamp/fast/shell/fish/ship/brush/chick/lunch/watch/catch/phone/dolphin/whale/white/this/that/mather/father/three/teeth/think/bath/duck/rocket/queen/quilt/king/long/bank/pink/wind/hand/tent/paint/belt/adult/lamp/camp/skunk/desk/scale/school/spray/spring/string/strong/splash/splint/squid/square/rice/city/ice cream/cell phone/giraffe/orange/giant/cage/rose/jeans/cheese/legs".split('/');

let remaining = [...words];
let currentWord = null;
let autoTimer = null;
let intervalSec = 6;
let totalCount = words.length;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1.1;
  window.speechSynthesis.speak(utter);
}

function updateUI() {
  document.getElementById('remaining').textContent = remaining.length;
  const done = totalCount - remaining.length;
  document.getElementById('progress-bar').style.width = (done / totalCount * 100) + '%';
}

function nextWord() {
  if (remaining.length === 0) {
    document.getElementById('word-display').textContent = '🎉 おわり！';
    document.getElementById('word-number').textContent = '';
    document.getElementById('finished-msg').style.display = 'block';
    stopAuto();
    return;
  }
  const idx = Math.floor(Math.random() * remaining.length);
  currentWord = remaining.splice(idx, 1)[0];
  const done = totalCount - remaining.length;
  document.getElementById('word-display').textContent = currentWord;
  document.getElementById('word-number').textContent = done + ' / ' + totalCount;
  document.getElementById('finished-msg').style.display = 'none';
  updateUI();
  speak(currentWord);
}

function repeatWord() {
  if (currentWord) speak(currentWord);
}

function resetAll() {
  remaining = shuffle([...words]);
  currentWord = null;
  document.getElementById('word-display').textContent = 'ここに たんごが でるよ！';
  document.getElementById('word-number').textContent = '';
  document.getElementById('finished-msg').style.display = 'none';
  updateUI();
  stopAuto();
  document.getElementById('auto-toggle').checked = false;
  window.speechSynthesis && window.speechSynthesis.cancel();
}

function toggleAuto() {
  if (document.getElementById('auto-toggle').checked) {
    startAuto();
  } else {
    stopAuto();
  }
}

function startAuto() {
  stopAuto();
  nextWord();
  autoTimer = setInterval(() => {
    if (remaining.length === 0) { stopAuto(); return; }
    nextWord();
  }, intervalSec * 1000);
}

function stopAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

function updateInterval() {
  intervalSec = parseInt(document.getElementById('interval-slider').value);
  document.getElementById('interval-label').textContent = intervalSec + 'びょう';
  if (document.getElementById('auto-toggle').checked) startAuto();
}

// 初期シャッフル
shuffle(remaining);
updateUI();
</script>
</body>
</html>
