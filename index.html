<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>えいごべんきょう</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            text-align: center;
            background-color: #fffaf0;
            background-image: radial-gradient(#ffdfba 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        h1 {
            color: #ff69b4;
            font-size: 28px;
            margin-bottom: 40px;
            text-shadow: 1px 1px white;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            max-width: 480px;
            margin: 0 auto;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 30px 20px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15);
            transition: 0.1s;
            box-sizing: border-box;
        }
        .menu-btn:active { box-shadow: none; transform: translateY(8px); }
        .btn-quiz {
            background-color: #ff69b4;
            color: white;
        }
        .btn-karuta {
            background-color: #4db8ff;
            color: white;
        }
        .btn-kakomon {
            background-color: #c780ff;
            color: white;
        }
        .subtitle {
            font-size: 14px;
            opacity: 0.85;
            margin-top: 6px;
        }

        /* かこもんサブメニュー */
        .kakomon-wrap {
            width: 100%;
        }
        .sub-menu {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }
        .sub-menu.open {
            display: flex;
        }
        .sub-btn {
            display: block;
            width: 100%;
            padding: 18px 20px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 20px;
            color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            transition: 0.1s;
            box-sizing: border-box;
        }
        .sub-btn:active { box-shadow: none; transform: translateY(6px); }
        .btn-r1 { background-color: #ff9d00; }
        .btn-r2 { background-color: #4db8ff; }
        .btn-r3 { background-color: #c780ff; }
    </style>
</head>
<body>
    <h1>✨ えいごべんきょう ✨</h1>
    <div class="menu">
        <a class="menu-btn btn-quiz" href="quiz.html">
            am / is / are クイズ<br>
            <span class="subtitle">be動詞をえらぼう！</span>
        </a>
        <a class="menu-btn btn-karuta" href="karuta.html">
            えいごかるた<br>
            <span class="subtitle">96このたんごをおぼえよう！</span>
        </a>

        <!-- かこもんセクション -->
        <div class="kakomon-wrap">
            <button class="menu-btn btn-kakomon" onclick="toggleKakomon()">
                📚 かこもん（英検5級）<br>
                <span class="subtitle">過去問でれんしゅうしよう！</span>
            </button>
            <div class="sub-menu" id="kakomonMenu">
                <a class="sub-btn btn-r1" href="reading1.html">
                    リーディング①<br>
                    <span class="subtitle" style="color:rgba(255,255,255,0.85)">単語・文法の穴埋め（15問）</span>
                </a>
                <a class="sub-btn btn-r2" href="reading2.html">
                    リーディング②<br>
                    <span class="subtitle" style="color:rgba(255,255,255,0.85)">会話の応答文（5問）</span>
                </a>
                <a class="sub-btn btn-r3" href="reading3.html">
                    リーディング③<br>
                    <span class="subtitle" style="color:rgba(255,255,255,0.85)">語句の並べ替え（5問）</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleKakomon() {
            document.getElementById('kakomonMenu').classList.toggle('open');
        }
    </script>
</body>
</html>
