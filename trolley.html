            background: #660033;
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 18px 50px;
            border: none;
            border-radius: 50px;

            max-width: 660px;
            border-radius: 16px;
            background: #e8f4e8;
            display: block;
        }

            width: 100%;

        .char-btn {
            border: none;
            border-radius: 20px;

            font-weight: bold;
            cursor: pointer;

            flex-direction: column;
            align-items: center;

// Normalize: convert 1-indexed a to 0-indexed, flatten sentences to string
const allData = rawData.map(r => ({
  q: r.s.join('\n').replace(/\( \[BLANK\] \)/g, '___'),
  choices: r.c,
  a: r.a - 1
}));

function buildQuestion(raw) {
  const correctText = raw.choices[raw.a];
  const shuffled = [...raw.choices].sort(() => Math.random() - 0.5);
  return { q: raw.q, choices: shuffled, a: shuffled.indexOf(correctText) };
}

// ─── Game state ───────────────────────────────────────────────────────────────
let quizList = [], qi = 0, score = 0, answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ─── Canvas layout ────────────────────────────────────────────────────────────
const CW = 660, CH = 250;
const RAIL_Y = 218;
const TRAIN_W = 220, TRAIN_H = 72;
const TRAIN_STOP_X = 80;
const PLATFORM_X = 310, PLATFORM_W = 340, PLATFORM_Y = 200;
const CHAR_SIZE = 48;
const CHAR_FOOT_Y = PLATFORM_Y;
const CHAR_XS = [335, 405, 475, 545];
const DOOR_X = TRAIN_STOP_X + TRAIN_W - 22;

// ─── Animation state ──────────────────────────────────────────────────────────
let trainX = -TRAIN_W;
let animFrame = null;
let phase = 'idle'; // idle | approaching | arrived | boarding | departing
let wrongIdx = -1;
let boardingCharIdx = -1;  // index currently animating toward door
let boardedCharIdx  = -1;  // index that has boarded (hide this one afterward)
let boardingCharX   = 0;

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
function easeIn(t)  { return Math.pow(t, 3); }

function startApproach() {
  const startX = -TRAIN_W - 20, endX = TRAIN_STOP_X, dur = 1800;
  const t0 = performance.now();
  phase = 'approaching';
  if (animFrame) cancelAnimationFrame(animFrame);
  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    trainX = startX + (endX - startX) * easeOut(p);
    drawScene();
    if (p < 1) { animFrame = requestAnimationFrame(tick); }
    else { trainX = endX; phase = 'arrived'; drawScene(); enableButtons(); }
  }
  animFrame = requestAnimationFrame(tick);
}

function startBoarding(charIdx) {
  boardingCharIdx = charIdx;
  boardedCharIdx  = charIdx;
  boardingCharX   = CHAR_XS[charIdx];
  const startX = CHAR_XS[charIdx], dur = 550, t0 = performance.now();
  phase = 'boarding';
  if (animFrame) cancelAnimationFrame(animFrame);
  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    boardingCharX = startX + (DOOR_X - startX) * easeOut(p);
    drawScene();
    if (p < 1) { animFrame = requestAnimationFrame(tick); }
    else { boardingCharIdx = -1; startDepart(); }
  }
  animFrame = requestAnimationFrame(tick);
}

function startDepart() {
  const startX = TRAIN_STOP_X, endX = CW + 40, dur = 1100, t0 = performance.now();
  phase = 'departing';
  disableButtons();
  if (animFrame) cancelAnimationFrame(animFrame);
  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    trainX = startX + (endX - startX) * easeIn(p);
    drawScene();
    if (p < 1) { animFrame = requestAnimationFrame(tick); }
    else { phase = 'idle'; showNextBtn(); }
  }
  animFrame = requestAnimationFrame(tick);
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawScene() {
  const canvas = document.getElementById('train-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, CW, CH);
  drawBackground(ctx);
  drawStation(ctx);
  drawPlatform(ctx);
  drawTrack(ctx);
  drawTrain(ctx, trainX);
  drawCharacters(ctx);
}

function drawBackground(ctx) {
  const sky = ctx.createLinearGradient(0, 0, 0, CH * 0.78);
  sky.addColorStop(0, '#87ceeb');
  sky.addColorStop(1, '#c8e8ff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, CW, CH * 0.78);
  ctx.fillStyle = '#8db87a';
  ctx.fillRect(0, CH * 0.78, CW, CH * 0.22);
}

function drawStation(ctx) {
  const sx = PLATFORM_X, sw = PLATFORM_W;

  // ── Building wall (cream stone) ──
  ctx.fillStyle = '#f0e4c8';
  ctx.fillRect(sx, 78, sw, PLATFORM_Y - 78);

  // Horizontal stone lines (texture)
  ctx.strokeStyle = 'rgba(0,0,0,0.07)';
  ctx.lineWidth = 1;
  for (let y = 90; y < PLATFORM_Y; y += 14) {
    ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + sw, y); ctx.stroke();
  }

  // Pilasters (columns embedded in wall)
  const pilW = 11;
  const pilXs = [sx, sx + Math.floor(sw * 0.34), sx + Math.floor(sw * 0.67), sx + sw - pilW];
  ctx.fillStyle = '#c8a870';
  pilXs.forEach(px => ctx.fillRect(px, 78, pilW, PLATFORM_Y - 78));

  // Arched windows between pilasters (first two gaps)
  for (let g = 0; g < 2; g++) {
    const wx = pilXs[g] + pilW + 8;
    const wr = pilXs[g + 1] - pilXs[g] - pilW * 2 - 16; // window width
    const wy = 92, wh = 55, rad = wr / 2;
    ctx.fillStyle = '#c8e8f8';
    ctx.beginPath();
    ctx.arc(wx + rad, wy + rad, rad, Math.PI, 0); // arch top
    ctx.lineTo(wx + wr, wy + rad + wh);
    ctx.lineTo(wx, wy + rad + wh);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#a09060'; ctx.lineWidth = 1.5;
    ctx.stroke();
    // cross bars
    ctx.beginPath();
    ctx.moveTo(wx + rad, wy + rad); ctx.lineTo(wx + rad, wy + rad + wh); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(wx, wy + rad + wh * 0.5); ctx.lineTo(wx + wr, wy + rad + wh * 0.5); ctx.stroke();
  }

  // Gold cornice band
  ctx.fillStyle = '#b89840';
  ctx.fillRect(sx - 4, 74, sw + 8, 6);

  // Dark roof/fascia band
  ctx.fillStyle = '#2a1008';
  ctx.fillRect(sx - 6, 38, sw + 12, 38);

  // Roof ridge highlight
  ctx.fillStyle = '#441808';
  ctx.fillRect(sx - 6, 38, sw + 12, 5);

  // "Station" sign board (navy blue, inside fascia)
  const sgnX = sx + 16, sgnW = sw - 32, sgnY = 44, sgnH = 24;
  ctx.fillStyle = '#0d2b72';
  roundRect(ctx, sgnX, sgnY, sgnW, sgnH, 5);
  ctx.fill();
  // Gold border
  ctx.strokeStyle = '#c8a844'; ctx.lineWidth = 2;
  ctx.stroke();
  // "Station" text
  ctx.fillStyle = 'white';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Station', sx + sw / 2, sgnY + 17);

  // "えいご駅" label below sign in fascia
  ctx.fillStyle = '#c8a844';
  ctx.font = '10px sans-serif';
  ctx.fillText('えいご駅', sx + sw / 2, 77);
}

function drawPlatform(ctx) {
  ctx.fillStyle = '#c0a898';
  ctx.fillRect(PLATFORM_X, PLATFORM_Y, PLATFORM_W, 22);
  ctx.fillStyle = '#e8d880';
  ctx.fillRect(PLATFORM_X, PLATFORM_Y, PLATFORM_W, 5);
}

function drawTrack(ctx) {
  ctx.strokeStyle = '#888'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, RAIL_Y);     ctx.lineTo(CW, RAIL_Y);     ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, RAIL_Y + 8); ctx.lineTo(CW, RAIL_Y + 8); ctx.stroke();
  ctx.strokeStyle = '#7a5c3a'; ctx.lineWidth = 3;
  for (let x = 10; x < CW; x += 22) {
    ctx.beginPath(); ctx.moveTo(x, RAIL_Y - 2); ctx.lineTo(x, RAIL_Y + 12); ctx.stroke();
  }
}

function drawTrain(ctx, x) {
  const y = RAIL_Y - TRAIN_H, w = TRAIN_W, h = TRAIN_H;
  ctx.fillStyle = '#660033'; roundRect(ctx, x, y, w, h, 8); ctx.fill();
  ctx.fillStyle = '#c8a844'; ctx.fillRect(x, y + h * 0.55, w, 7);
  ctx.fillStyle = '#d0eeff';
  ctx.fillRect(x + 18, y + 10, 55, 32);
  ctx.fillRect(x + 95, y + 10, 55, 32);
  ctx.strokeStyle = '#440022'; ctx.lineWidth = 2;
  ctx.strokeRect(x + 18, y + 10, 55, 32);
  ctx.strokeRect(x + 95, y + 10, 55, 32);
  ctx.fillStyle = '#550028'; ctx.fillRect(x + w - 44, y + 8, 34, h - 8);
  ctx.strokeStyle = '#440022'; ctx.strokeRect(x + w - 44, y + 8, 34, h - 8);
  ctx.fillStyle = '#c8a844'; ctx.fillRect(x + w - 20, y + h * 0.5 - 8, 3, 16);
  ctx.fillStyle = '#002244'; ctx.fillRect(x + 165, y + 12, 40, 16);
  ctx.fillStyle = '#ffffaa'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('梅田', x + 185, y + 24);
  ctx.strokeStyle = '#999'; ctx.lineWidth = 2;
  const px = x + 60;
  ctx.beginPath(); ctx.moveTo(px, y); ctx.lineTo(px - 12, y - 18); ctx.lineTo(px + 12, y - 18); ctx.lineTo(px, y - 30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px - 16, y - 18); ctx.lineTo(px + 16, y - 18); ctx.stroke();
  if (phase === 'arrived' && wrongIdx >= 0) {
    ctx.save();
    ctx.strokeStyle = 'red'; ctx.lineWidth = 8; ctx.globalAlpha = 0.75;
    const cx2 = x + w / 2, cy2 = y + h / 2;
    ctx.beginPath(); ctx.moveTo(cx2 - 28, cy2 - 28); ctx.lineTo(cx2 + 28, cy2 + 28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx2 + 28, cy2 - 28); ctx.lineTo(cx2 - 28, cy2 + 28); ctx.stroke();
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawCharacters(ctx) {
  if (phase === 'idle') return;
  const q = quizList[qi];
  for (let i = 0; i < 4; i++) {
    if (i === boardingCharIdx && phase === 'boarding') {
      // This character is sliding toward the door
      const progress = Math.max(0, Math.min(1, (boardingCharX - CHAR_XS[i]) / (DOOR_X - CHAR_XS[i])));
      ctx.globalAlpha = Math.max(0.05, 1 - progress * 0.95);
      drawCharImage(ctx, i, boardingCharX, CHAR_FOOT_Y, q.choices[i], false);
      ctx.globalAlpha = 1;
    } else if (i !== boardedCharIdx) {
      // All chars except the one already inside the train
      const showBubble = (phase === 'arrived');
      drawCharImage(ctx, i, CHAR_XS[i], CHAR_FOOT_Y, q.choices[i], showBubble);
    }
    // boardedCharIdx is hidden (inside the departed train)
  }
}

function drawCharImage(ctx, idx, cx, footY, label, showBubble) {
  const img = charImages[idx];
  if (img && img.complete && img.naturalWidth > 0) {
    const aspect = img.naturalWidth / img.naturalHeight;
    const h = CHAR_SIZE, w = h * aspect;
    ctx.drawImage(img, cx - w / 2, footY - h, w, h);
  }
  if (showBubble) drawSpeechBubble(ctx, cx, footY - CHAR_SIZE - 3, label);
}

function drawSpeechBubble(ctx, cx, bottomY, text) {
  // Dynamically size bubble to text
  ctx.save();
  ctx.font = 'bold 10px sans-serif';
  const tw = ctx.measureText(text).width;
  const bw = Math.max(38, tw + 12), bh = 18;
  const bx = Math.max(PLATFORM_X + 2, Math.min(CW - bw - 2, cx - bw / 2));
  const by = bottomY - bh;
  ctx.fillStyle = 'white';
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
  roundRect(ctx, bx, by, bw, bh, 5);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - 4, by + bh); ctx.lineTo(cx + 4, by + bh); ctx.lineTo(cx, by + bh + 7);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.textAlign = 'center';
  ctx.fillText(text, bx + bw / 2, by + bh - 4);
  ctx.restore();
}

// ─── Question rendering ───────────────────────────────────────────────────────
function renderQuestion(raw) {
  // raw.q has lines joined by \n, blanks are ___
  // Speaker pattern: "Word: " or "Word Word: " at start of line
  return raw.q.split('\n').map(line => {
    const withBlank = line.replace(/___/g, '<span class="blank">　　　　</span>');
    const m = withBlank.match(/^([A-Za-z][A-Za-z0-9 .]*:\s)([\s\S]*)$/);
    if (m) return `<span class="speaker">${m[1]}</span>${m[2]}`;
    return withBlank;
  }).join('<br>');
}

// ─── Game flow ────────────────────────────────────────────────────────────────
function startGame() {
  quizList = shuffle([...allData]).slice(0, 10).map(buildQuestion);
  qi = 0; score = 0; answered = false;
  document.getElementById('screen-welcome').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'flex';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  wrongIdx = -1;
  boardedCharIdx = -1;
  const q = quizList[qi];
  document.getElementById('q-counter').textContent = `${qi + 1} / ${quizList.length}`;
  document.getElementById('score-disp').textContent = `⭕ ${score}`;
  document.getElementById('progress-bar').style.width = (qi / quizList.length * 100) + '%';
  document.getElementById('q-text').innerHTML = renderQuestion(q);
  for (let i = 0; i < 4; i++) {
    document.getElementById('choice' + i).textContent = q.choices[i];
    const btn = document.getElementById('btn' + i);
    btn.disabled = false;
    btn.classList.remove('correct', 'wrong');
  }
  document.getElementById('feedback-area').textContent = '';
  document.getElementById('next-btn').style.display = 'none';
  trainX = -TRAIN_W - 20;
  phase = 'approaching';
  disableButtons();
  drawScene();
  startApproach();
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const q = quizList[qi];
  const correct = (idx === q.a);
  document.getElementById('btn' + idx).classList.add(correct ? 'correct' : 'wrong');
  if (correct) {
    score++;
    document.getElementById('feedback-area').textContent = '⭕ せいかい！';
    document.getElementById('score-disp').textContent = `⭕ ${score}`;
    disableButtons();
    setTimeout(() => startBoarding(q.a), 300);
  } else {
    wrongIdx = idx;
    document.getElementById('btn' + q.a).classList.add('correct');
    document.getElementById('feedback-area').textContent = `❌ せいかいは「${q.choices[q.a]}」だよ！`;
    disableButtons();
    drawScene();
    setTimeout(() => showNextBtn(), 800);
  }
}

function disableButtons() {
  for (let i = 0; i < 4; i++) document.getElementById('btn' + i).disabled = true;
}
function enableButtons() {
  for (let i = 0; i < 4; i++) document.getElementById('btn' + i).disabled = false;
}
function showNextBtn() {
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  qi++;
  if (qi >= quizList.length) showClear();
  else loadQuestion();
}

function showClear() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-clear').style.display = 'flex';
  document.getElementById('final-score').textContent = score;
  document.getElementById('progress-bar').style.width = '100%';
}

function restartGame() {
  document.getElementById('screen-clear').style.display = 'none';
  document.getElementById('screen-welcome').style.display = 'flex';
}

// Initial idle canvas draw
(function() {
  const canvas = document.getElementById('train-canvas');
  const ctx = canvas.getContext('2d');
  drawBackground(ctx);
  drawStation(ctx);
  drawPlatform(ctx);
  drawTrack(ctx);
  ctx.textAlign = 'center';
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = '#660033';
  ctx.fillText('「出発！」をおしてね 🚃', CW / 2, CH / 2 + 20);
})();
</script>
