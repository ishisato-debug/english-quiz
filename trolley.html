<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train game</title>
    <style>

            font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;

            background-image: radial-gradient(#ffdfba 1px, transparent 1px);

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 10px 30px;
        }

        h1 {
            color: #660033;

            margin: 8px 0 4px;
            text-shadow: 1px 1px white;
            text-align: center;
        }

        .screen {
            width: 100%;
            max-width: 660px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* ── Welcome ── */
        .welcome-card {
            background: white;
            border: 5px solid #c8a844;
            border-radius: 30px;
            padding: 28px 24px;
            box-shadow: 0 8px 0 #c8a844;
            text-align: center;
            width: 100%;
        }
        .welcome-card h2 { font-size: 22px; color: #660033; margin-bottom: 16px; }
        .welcome-card p  { font-size: 15px; color: #555; line-height: 1.7; }

        .start-btn {
            background: #660033;
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 18px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 7px 0 #3a0020;
            transition: 0.1s;
        }
        .start-btn:active { transform: translateY(7px); box-shadow: none; }

        /* ── Quiz ── */
        #screen-quiz { display: none; }

        .progress-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-size: 14px;
            color: #888;
            gap: 16px;
        }
        #q-counter { text-align: center; }
        #score-disp { white-space: nowrap; }

        #progress-bar-wrap {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #660033, #c8a844);
            border-radius: 4px;
            transition: width 0.4s;
            width: 0%;
        }

        .question-box {
            background: white;
            border: 4px solid #ffb6c1;
            border-radius: 24px;
            padding: 14px 18px 12px;
            width: 100%;
            box-shadow: 0 6px 0 #ffb6c1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .q-text {
            font-size: clamp(14px, 3.5vw, 19px);
            font-weight: bold;
            color: #333;
            line-height: 1.85;
            text-align: left;
        }
        .q-text .speaker { color: #999; font-size: 0.88em; }
        .blank { color: #ff1493; border-bottom: 2px solid #ff1493; padding: 0 6px; }

        .voice-btn {
            background: #fff8e8;
            border: 2px solid #c8a844;
            border-radius: 20px;
            padding: 7px 18px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            color: #660033;
        }
        .voice-btn:active { background: #f0e0a0; }

        /* ── Canvas ── */
        #train-canvas {
            width: 100%;
            max-width: 660px;
            border-radius: 16px;
            background: #e8f4e8;
            display: block;
        }

        /* ── Character buttons ── */
        .char-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }
        .char-btn {
            border: none;
            border-radius: 20px;
            padding: 10px 8px 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: 0.1s;
            min-height: 96px;

        .char-btn:active { transform: translateY(4px); box-shadow: none !important; }

        .char-btn .choice-text { font-size: clamp(14px, 3.5vw, 18px); text-align: center; line-height: 1.35; }

function buildQuestion(raw) {
  const correctText = raw.choices[raw.a];
  const shuffled = [...raw.choices].sort(() => Math.random() - 0.5);
  return { q: raw.q, choices: shuffled, a: shuffled.indexOf(correctText) };
}

// ─── Background removal ───────────────────────────────────────────────────────
function removeBackground(img, threshold = 15) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0, 0, c.width, c.height);
  const px = d.data, w = c.width, h = c.height;
  // Sample all 4 corners to handle images where one corner might be character
  const corners = [0, w-1, w*(h-1), w*h-1];
  const bgR = px[corners[0]*4], bgG = px[corners[0]*4+1], bgB = px[corners[0]*4+2];
  const visited = new Uint8Array(w * h);
  const stack = [...corners];
  corners.forEach(i => { visited[i] = 1; });
  while (stack.length) {
    const i = stack.pop(), x = i % w, y = ~~(i / w), p = i * 4;
    const dr = px[p]-bgR, dg = px[p+1]-bgG, db = px[p+2]-bgB;
    if (Math.sqrt(dr*dr + dg*dg + db*db) > threshold) continue;
    px[p+3] = 0;
    for (const [nx, ny] of [[x-1,y],[x+1,y],[x,y-1],[x,y+1]]) {
      if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
        const ni = ny*w+nx;
        if (!visited[ni]) { visited[ni] = 1; stack.push(ni); }
      }
    }
  }
  ctx.putImageData(d, 0, 0);
  return c;
}

const CHAR_XS = [345, 435, 525, 615]; // spread across full station width

// ─── Animation state ──────────────────────────────────────────────────────────

let animFrame = null;

let boardingCharIdx = -1;

let boardingCharX   = 0;
let jumpingCharIdx  = -1;

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
function easeIn(t)  { return Math.pow(t, 3); }

function startApproach() {
  const startX = -TRAIN_W - 20, endX = TRAIN_STOP_X, dur = 1800, t0 = performance.now();
  phase = 'approaching';
  if (animFrame) cancelAnimationFrame(animFrame);
  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    trainX = startX + (endX - startX) * easeOut(p);
    drawScene();
    if (p < 1) { animFrame = requestAnimationFrame(tick); }
    else { trainX = endX; phase = 'arrived'; drawScene(); enableButtons(); }
  }
  animFrame = requestAnimationFrame(tick);
}

function startBoarding(charIdx) {
  boardingCharIdx = charIdx;
  boardedCharIdx  = charIdx;
  boardingCharX   = CHAR_XS[charIdx];
  const startX = CHAR_XS[charIdx], dur = 600, t0 = performance.now();

  if (animFrame) cancelAnimationFrame(animFrame);
  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    boardingCharX = startX + (DOOR_X - startX) * easeOut(p);
    drawScene();
    if (p < 1) { animFrame = requestAnimationFrame(tick); }
    else { boardingCharIdx = -1; startDepart(); }
  }
  animFrame = requestAnimationFrame(tick);
}

function startDepart() {
  const startX = TRAIN_STOP_X, endX = CW + 40, dur = 1100, t0 = performance.now();
  phase = 'departing';
  disableButtons();
  if (animFrame) cancelAnimationFrame(animFrame);
  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    trainX = startX + (endX - startX) * easeIn(p);
    drawScene();
    if (p < 1) { animFrame = requestAnimationFrame(tick); }
    else { phase = 'idle'; showNextBtn(); }
  }
  animFrame = requestAnimationFrame(tick);
}

function startJump(charIdx, onDone) {
  jumpingCharIdx = charIdx;
  phase = 'jumping';
  const dur = 700, bounces = 3, jumpH = 28, t0 = performance.now();
  if (animFrame) cancelAnimationFrame(animFrame);
  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    jumpOffset = -Math.abs(Math.sin(p * Math.PI * bounces)) * jumpH;
    drawScene();
    if (p < 1) { animFrame = requestAnimationFrame(tick); }
    else { jumpOffset = 0; jumpingCharIdx = -1; onDone(); }
  }
  animFrame = requestAnimationFrame(tick);
}

// ─── Sound ────────────────────────────────────────────────────────────────────
function playDingDong() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(659.25, ctx.currentTime);
  osc.frequency.setValueAtTime(523.25, ctx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.55);
}

function speakQuestion() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const q = quizList[qi];
  const correct = q.choices[q.a];
  const text = q.q
    .replace(/___/g, correct)
    .split('\n')
    .map(line => line.replace(/^[A-Za-z][A-Za-z0-9 .]*:\s/, ''))
    .join('. ');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawScene() {
  const canvas = document.getElementById('train-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, CW, CH);
  drawBackground(ctx);
  drawStation(ctx);
  drawPlatform(ctx);
  drawTrack(ctx);
  drawCharacters(ctx);   // platform chars drawn BEFORE train
  drawTrain(ctx, trainX);
  drawCharInWindow(ctx); // boarded char drawn AFTER train (clipped to window)
}

function drawBackground(ctx) {
  const sky = ctx.createLinearGradient(0, 0, 0, CH * 0.78);
  sky.addColorStop(0, '#87ceeb'); sky.addColorStop(1, '#c8e8ff');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, CW, CH * 0.78);
  ctx.fillStyle = '#8db87a'; ctx.fillRect(0, CH * 0.78, CW, CH * 0.22);
}

function drawStation(ctx) {
  const sx = PLATFORM_X, sw = PLATFORM_W;

  // Building wall
  ctx.fillStyle = '#f0e4c8';
  ctx.fillRect(sx, 80, sw, PLATFORM_Y - 80);

  // Stone texture lines
  ctx.strokeStyle = 'rgba(0,0,0,0.07)'; ctx.lineWidth = 1;
  for (let y = 92; y < PLATFORM_Y; y += 14) {
    ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + sw, y); ctx.stroke();
  }

  // 5 pilasters creating 4 character bays
  const pilW = 11;
  const pils = [sx, sx + sw*0.25, sx + sw*0.5, sx + sw*0.75, sx + sw - pilW];
  ctx.fillStyle = '#c8a870';
  pils.forEach(px => ctx.fillRect(Math.round(px), 80, pilW, PLATFORM_Y - 80));

  // 4 arched windows (one per bay)
  for (let g = 0; g < 4; g++) {
    const wx = Math.round(pils[g]) + pilW + 6;
    const ww = Math.round(pils[g + 1]) - Math.round(pils[g]) - pilW - 12;
    const wy = 92, rad = ww / 2, rectH = 40;
    ctx.fillStyle = '#c8e4f8';
    ctx.beginPath();
    ctx.arc(wx + rad, wy + rad, rad, Math.PI, 0);
    ctx.lineTo(wx + ww, wy + rad + rectH);
    ctx.lineTo(wx, wy + rad + rectH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#a09060'; ctx.lineWidth = 1.5;
    ctx.stroke();
    // cross bar
    ctx.beginPath();
    ctx.moveTo(wx + rad, wy + rad); ctx.lineTo(wx + rad, wy + rad + rectH); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(wx, wy + rad + rectH * 0.5); ctx.lineTo(wx + ww, wy + rad + rectH * 0.5); ctx.stroke();
  }

  // Gold cornice
  ctx.fillStyle = '#b89840'; ctx.fillRect(sx - 4, 76, sw + 8, 6);

  // Dark roof/fascia
  ctx.fillStyle = '#2a1008'; ctx.fillRect(sx - 6, 38, sw + 12, 40);
  ctx.fillStyle = '#3e1a0a'; ctx.fillRect(sx - 6, 38, sw + 12, 5);

  // "Station" sign board
  const sgnX = sx + 16, sgnW = sw - 32, sgnY = 44, sgnH = 26;
  ctx.fillStyle = '#0d2b72';
  roundRect(ctx, sgnX, sgnY, sgnW, sgnH, 5); ctx.fill();
  ctx.strokeStyle = '#c8a844'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Station', sx + sw / 2, sgnY + 19);
}

function drawPlatform(ctx) {
  ctx.fillStyle = '#c0a898'; ctx.fillRect(PLATFORM_X, PLATFORM_Y, PLATFORM_W, 22);
  ctx.fillStyle = '#e8d880'; ctx.fillRect(PLATFORM_X, PLATFORM_Y, PLATFORM_W, 5);
}

function drawTrack(ctx) {
  ctx.strokeStyle = '#888'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, RAIL_Y);     ctx.lineTo(CW, RAIL_Y);     ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, RAIL_Y + 8); ctx.lineTo(CW, RAIL_Y + 8); ctx.stroke();
  ctx.strokeStyle = '#7a5c3a'; ctx.lineWidth = 3;
  for (let x = 10; x < CW; x += 22) {
    ctx.beginPath(); ctx.moveTo(x, RAIL_Y - 2); ctx.lineTo(x, RAIL_Y + 12); ctx.stroke();
  }
}

function drawTrain(ctx, x) {
  const y = RAIL_Y - TRAIN_H, w = TRAIN_W, h = TRAIN_H;
  ctx.fillStyle = '#660033'; roundRect(ctx, x, y, w, h, 8); ctx.fill();
  ctx.fillStyle = '#c8a844'; ctx.fillRect(x, y + h * 0.55, w, 7);
  ctx.fillStyle = '#d0eeff';
  ctx.fillRect(x + 18, y + 10, 55, 32); ctx.fillRect(x + 95, y + 10, 55, 32);
  ctx.strokeStyle = '#440022'; ctx.lineWidth = 2;
  ctx.strokeRect(x + 18, y + 10, 55, 32); ctx.strokeRect(x + 95, y + 10, 55, 32);
  ctx.fillStyle = '#550028'; ctx.fillRect(x + w - 44, y + 8, 34, h - 8);
  ctx.strokeStyle = '#440022'; ctx.strokeRect(x + w - 44, y + 8, 34, h - 8);
  ctx.fillStyle = '#c8a844'; ctx.fillRect(x + w - 20, y + h * 0.5 - 8, 3, 16);
  ctx.fillStyle = '#002244'; ctx.fillRect(x + 165, y + 12, 40, 16);
  ctx.fillStyle = '#ffffaa'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('梅田', x + 185, y + 24);
  ctx.strokeStyle = '#999'; ctx.lineWidth = 2;
  const px = x + 60;
  ctx.beginPath(); ctx.moveTo(px, y); ctx.lineTo(px-12, y-18); ctx.lineTo(px+12, y-18); ctx.lineTo(px, y-30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px-16, y-18); ctx.lineTo(px+16, y-18); ctx.stroke();
  if (phase === 'arrived' && wrongIdx >= 0) {
    ctx.save();
    ctx.strokeStyle = 'red'; ctx.lineWidth = 8; ctx.globalAlpha = 0.75;
    const cx2 = x + w/2, cy2 = y + h/2;
    ctx.beginPath(); ctx.moveTo(cx2-28, cy2-28); ctx.lineTo(cx2+28, cy2+28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx2+28, cy2-28); ctx.lineTo(cx2-28, cy2+28); ctx.stroke();
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawCharacters(ctx) {
  if (phase === 'idle') return;
  const q = quizList[qi];
  for (let i = 0; i < 4; i++) {
    if (i === boardingCharIdx && phase === 'boarding') {
      const progress = Math.max(0, Math.min(1, (boardingCharX - CHAR_XS[i]) / (DOOR_X - CHAR_XS[i])));
      ctx.globalAlpha = Math.max(0.05, 1 - progress * 0.95);
      drawCharImage(ctx, i, boardingCharX, CHAR_FOOT_Y, q.choices[i], false);
      ctx.globalAlpha = 1;
    } else if (i !== boardedCharIdx) {
      const isJumping = (i === jumpingCharIdx);
      const footY = isJumping ? CHAR_FOOT_Y + jumpOffset : CHAR_FOOT_Y;
      drawCharImage(ctx, i, CHAR_XS[i], footY, q.choices[i], phase === 'arrived');
    }
  }
}

function drawCharInWindow(ctx) {
  if (boardedCharIdx < 0 || phase !== 'departing') return;
  const trainY = RAIL_Y - TRAIN_H;
  // Use the right window: x+95, y+10, w=55, h=32
  const winX = trainX + 95, winY = trainY + 10, winW = 55, winH = 32;
  // Refill window background
  ctx.fillStyle = '#d0eeff';
  ctx.fillRect(winX, winY, winW, winH);
  // Clip to window and draw character
  ctx.save();
  ctx.beginPath();
  ctx.rect(winX, winY, winW, winH);
  ctx.clip();
  const source = charCanvases[boardedCharIdx] || charImages[boardedCharIdx];
  if (source && (source.width || (source.complete && source.naturalWidth > 0))) {
    const charH = winH * 1.6;
    const aspect = (source.width || source.naturalWidth) / (source.height || source.naturalHeight);
    const charW = charH * aspect;
    ctx.drawImage(source, winX + (winW - charW) / 2, winY, charW, charH);
  }
  ctx.restore();
  // Redraw window frame on top
  ctx.strokeStyle = '#440022'; ctx.lineWidth = 2;
  ctx.strokeRect(winX, winY, winW, winH);
}

function drawCharImage(ctx, idx, cx, footY, label, showBubble) {
  const source = charCanvases[idx] || charImages[idx];
  if (source && (source.width || (source.complete && source.naturalWidth > 0))) {
    const aspect = (source.width || source.naturalWidth) / (source.height || source.naturalHeight);
    const h = CHAR_SIZE, w = h * aspect;
    ctx.drawImage(source, cx - w/2, footY - h, w, h);
  }
  if (showBubble) drawSpeechBubble(ctx, cx, footY - CHAR_SIZE - 4, label);
}

function drawSpeechBubble(ctx, cx, bottomY, text) {
  const display = text.length > 13 ? text.slice(0, 12) + '…' : text;
  ctx.save();
  ctx.font = 'bold 10px sans-serif';
  const tw = ctx.measureText(display).width;
  const bw = Math.max(36, tw + 12), bh = 18;
  const bx = Math.max(PLATFORM_X + 2, Math.min(CW - bw - 2, cx - bw/2));
  const by = bottomY - bh;
  ctx.fillStyle = 'white'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
  roundRect(ctx, bx, by, bw, bh, 5); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx-4, by+bh); ctx.lineTo(cx+4, by+bh); ctx.lineTo(cx, by+bh+7);
  ctx.fill();
  ctx.fillStyle = '#222'; ctx.textAlign = 'center';
  ctx.fillText(display, bx + bw/2, by + bh - 4);
  ctx.restore();
}

// ─── Question rendering ───────────────────────────────────────────────────────
function renderQuestion(raw) {
  return raw.q.split('\n').map(line => {
    const withBlank = line.replace(/___/g, '<span class="blank">　　　　</span>');
    const m = withBlank.match(/^([A-Za-z][A-Za-z0-9 .]*:\s)([\s\S]*)$/);
    if (m) return `<span class="speaker">${m[1]}</span>${m[2]}`;
    return withBlank;
  }).join('<br>');
}

// ─── Game flow ────────────────────────────────────────────────────────────────
function startGame() {
  quizList = shuffle([...allData]).slice(0, 10).map(buildQuestion);
  qi = 0; score = 0; answered = false;
  document.getElementById('screen-welcome').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'flex';
  loadQuestion();
}

function loadQuestion() {
  answered = false; wrongIdx = -1; boardingCharIdx = -1; boardedCharIdx = -1; jumpingCharIdx = -1; jumpOffset = 0;
  const q = quizList[qi];
  document.getElementById('q-counter').textContent = `${qi+1} / ${quizList.length}`;
  document.getElementById('score-disp').textContent = `⭕ ${score}`;
  document.getElementById('progress-bar').style.width = (qi / quizList.length * 100) + '%';
  document.getElementById('q-text').innerHTML = renderQuestion(q);
  for (let i = 0; i < 4; i++) {
    document.getElementById('choice' + i).textContent = q.choices[i];
    const btn = document.getElementById('btn' + i);
    btn.disabled = false; btn.classList.remove('correct', 'wrong');
  }
  document.getElementById('feedback-area').textContent = '';
  document.getElementById('next-btn').disabled = true;
  trainX = -TRAIN_W - 20; phase = 'approaching';
  disableButtons(); drawScene(); startApproach();
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const q = quizList[qi];
  const correct = (idx === q.a);
  document.getElementById('btn' + idx).classList.add(correct ? 'correct' : 'wrong');
  if (correct) {
    playDingDong();
    score++;
    document.getElementById('feedback-area').textContent = '⭕ せいかい！';
    document.getElementById('score-disp').textContent = `⭕ ${score}`;
    disableButtons();
    setTimeout(() => startJump(q.a, () => startBoarding(q.a)), 200);
  } else {
    wrongIdx = idx;
    document.getElementById('btn' + q.a).classList.add('correct');
    document.getElementById('feedback-area').textContent = `❌ せいかいは「${q.choices[q.a]}」だよ！`;
    disableButtons(); drawScene();
    setTimeout(() => showNextBtn(), 800);
  }
}

function disableButtons() {
  for (let i = 0; i < 4; i++) document.getElementById('btn' + i).disabled = true;
}
function enableButtons() {
  for (let i = 0; i < 4; i++) document.getElementById('btn' + i).disabled = false;
}
function showNextBtn() {
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  qi++;
  if (qi >= quizList.length) showClear(); else loadQuestion();
}

function showClear() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-clear').style.display = 'flex';
  document.getElementById('final-score').textContent = score;
  document.getElementById('progress-bar').style.width = '100%';
}

function restartGame() {
  document.getElementById('screen-clear').style.display = 'none';
  document.getElementById('screen-welcome').style.display = 'flex';
}

// Initial idle canvas
(function() {
  const canvas = document.getElementById('train-canvas');
  const ctx = canvas.getContext('2d');
  drawBackground(ctx);
  drawStation(ctx);
  drawPlatform(ctx);
  drawTrack(ctx);
  ctx.textAlign = 'center';
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = '#660033';
  ctx.fillText('「出発！」をおしてね 🚃', CW/2, CH/2 + 20);
})();
</script>
