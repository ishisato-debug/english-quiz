            flex-direction: column;
            align-items: center;
            padding: 10px 10px 30px;
        }

            color: #ff69b4;
            font-size: clamp(22px, 5vw, 32px);
            margin: 8px 0;
            text-shadow: 1px 1px white;
            text-align: center;
        }

        .screen {
            width: 100%;
            max-width: 660px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        #screen-welcome { gap: 20px; }
        .welcome-card {
            background: white;
            border: 5px solid #ffb6c1;

            padding: 28px 24px;
            box-shadow: 0 8px 0 #ffb6c1;
            text-align: center;
            width: 100%;
        }
        .welcome-card h2 { font-size: 22px; color: #ff69b4; margin-bottom: 16px; }
        .instructions { text-align: left; font-size: 16px; line-height: 2.2; color: #555; margin-bottom: 20px; }
        .start-btn {
            padding: 18px 60px; font-size: 24px; font-weight: bold;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 7px 0 #c94f8a; transition: transform 0.1s, box-shadow 0.1s;
        }
        .start-btn:active { box-shadow: none; transform: translateY(7px); }

        /* Game header */
        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; padding: 0 4px;
        }
        .badge { padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 18px; color: white; }
        .badge-score { background: #ff69b4; }
        .badge-progress { background: #4db8ff; }

        /* Canvas */
        #gameCanvas {
            width: 100%; border-radius: 18px; border: 4px solid #ffb6c1;
            display: block; background: #87CEEB;
        }

        /* Question card */
        .question-card {
            background: white; border: 4px solid #ffb6c1; border-radius: 22px;
            padding: 14px 18px; box-shadow: 0 6px 0 #ffb6c1;
            width: 100%; min-height: 70px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #question-text {
            font-size: clamp(14px, 3.2vw, 20px); font-weight: bold;
            line-height: 1.9; text-align: center; color: #333;
        }
        #question-text .blank-word {
            color: #ff1493; border-bottom: 3px solid #ff1493;
            padding: 0 4px; white-space: nowrap;
        }
        #question-text .speaker { color: #999; font-weight: normal; font-size: 0.85em; }
        #answer-reveal {
            margin-top: 10px; font-size: clamp(14px, 3vw, 18px);
            font-weight: bold; color: #ff6600; display: none;
        }

        /* Animal buttons (4 choices) */
        .animal-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .animal-btn {
            padding: 12px 8px; font-weight: bold; border: none;
            border-radius: 18px; cursor: pointer; color: white;
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; min-height: 80px;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .animal-btn:active { transform: translateY(5px); box-shadow: none !important; }
        .animal-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
        .animal-emoji { font-size: 28px; line-height: 1; }
        .animal-choice { font-size: clamp(12px, 2.8vw, 16px); line-height: 1.3; text-align: center; }
        .btn-rabbit  { background: linear-gradient(135deg, #ff88bb, #ff4499); box-shadow: 0 6px 0 #bb2270; }
        .btn-fox     { background: linear-gradient(135deg, #ff8c42, #ff5500); box-shadow: 0 6px 0 #bb3a00; }
        .btn-buffalo { background: linear-gradient(135deg, #a1887f, #6d4c41); box-shadow: 0 6px 0 #4e342e; }
        .btn-snake   { background: linear-gradient(135deg, #66bb6a, #2e7d32); box-shadow: 0 6px 0 #1b5e20; }

        /* Feedback overlay */
        #feedback-overlay {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 110px;
            animation: pop 0.3s ease-out; z-index: 200; pointer-events: none;
        }
        @keyframes pop {
            0%  { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.2); }
            100%{ transform: translate(-50%, -50%) scale(1);   opacity: 1; }
        }

        /* Game over */
        #screen-gameover { gap: 20px; }

            background: white; border: 5px solid #ffb6c1; border-radius: 30px;

        #score-message { font-size: 22px; font-weight: bold; color: #ff6600; margin: 12px 0 20px; }

        }
    </style>
</head>

const canvas = document.getElementById('gameCanvas');

const CW = 660, CH = 310;

const VP_Y  = 90;
const RAIL_W = 88;

function roundRect(x, y, w, h, r) {
    C.beginPath();
    C.moveTo(x+r, y); C.lineTo(x+w-r, y);
    C.quadraticCurveTo(x+w, y, x+w, y+r); C.lineTo(x+w, y+h-r);
    C.quadraticCurveTo(x+w, y+h, x+w-r, y+h); C.lineTo(x+r, y+h);
    C.quadraticCurveTo(x, y+h, x, y+h-r); C.lineTo(x, y+r);
    C.quadraticCurveTo(x, y, x+r, y); C.closePath();
}

function drawBG() {
    const sky = C.createLinearGradient(0, 0, 0, VP_Y);
    sky.addColorStop(0, '#3A7FBD'); sky.addColorStop(1, '#87CEEB');
    C.fillStyle = sky; C.fillRect(0, 0, CW, VP_Y);

    function cloud(cx, cy, r) {
        C.fillStyle = 'rgba(255,255,255,0.88)';
        [[0,0,1],[0.42,0.18,0.74],[-0.35,0.22,0.64],[0.1,0.42,0.8]].forEach(([dx,dy,s]) => {
            C.beginPath(); C.arc(cx+dx*r, cy+dy*r, r*s, 0, Math.PI*2); C.fill();
        });
    }
    cloud(90, 28, 26); cloud(270, 18, 22); cloud(490, 32, 32); cloud(610, 22, 20);

    C.fillStyle = '#9DC484';
    C.beginPath(); C.moveTo(0, VP_Y);
    [[0,0],[60,-22],[130,0],[210,-15],[290,-32],[370,-13],[455,-30],[540,-40],[630,-22],[CW,-17],[CW,VP_Y]]
        .forEach(([x, dy]) => C.lineTo(x, VP_Y + dy));
    C.closePath(); C.fill();

    const grd = C.createLinearGradient(0, VP_Y, 0, CH);
    grd.addColorStop(0, '#7ABD4A'); grd.addColorStop(1, '#4A8F2A');
    C.fillStyle = grd; C.fillRect(0, VP_Y, CW, CH - VP_Y);
}

function drawStraightTracks(phase) {
    C.fillStyle = '#B09464';
    C.beginPath();
    C.moveTo(VP_X-3, VP_Y+5); C.lineTo(VP_X+3, VP_Y+5);
    C.lineTo(VP_X+RAIL_W+42, CH); C.lineTo(VP_X-RAIL_W-42, CH);
    C.closePath(); C.fill();

    const N = 15;
    C.lineCap = 'butt';
    for (let i = 0; i < N; i++) {
        const raw = ((i / N) + (phase % 1.0)) % 1.0;
        const t   = 0.025 + 0.975 * raw * raw;
        const y   = VP_Y + (CH - VP_Y) * t;
        const lx  = VP_X - RAIL_W * t;
        const rx  = VP_X + RAIL_W * t;
        const ext = RAIL_W * t * 0.10 + 2;
        C.strokeStyle = '#7B5B3A'; C.lineWidth = Math.max(1.5, 9 * t);
        C.beginPath(); C.moveTo(lx-ext, y); C.lineTo(rx+ext, y); C.stroke();
    }

    C.strokeStyle = '#C0C0C0'; C.lineWidth = 4; C.lineCap = 'round';
    C.beginPath(); C.moveTo(VP_X, VP_Y+2); C.lineTo(VP_X-RAIL_W, CH); C.stroke();
    C.beginPath(); C.moveTo(VP_X, VP_Y+2); C.lineTo(VP_X+RAIL_W, CH); C.stroke();
}

    roundRect(-58, -54, 116, 52, 9); C.fill(); C.stroke();
    C.fillStyle = '#FFFDE7'; roundRect(-40, -49, 80, 30, 5); C.fill();
    C.fillStyle = '#444'; roundRect(-42, -66, 9, 16, 2); C.fill();
    C.globalAlpha = 0.55; C.fillStyle = '#DDD';
    C.beginPath(); C.arc(-39, -72, 7, 0, Math.PI*2); C.fill();
    C.beginPath(); C.arc(-34, -80, 5, 0, Math.PI*2); C.fill();
    C.globalAlpha = 1;
    C.fillStyle = '#42A5F5';
    C.beginPath(); C.arc(0, -62, 13, Math.PI, 0, false); C.fill();
    C.fillStyle = '#FFCC80';
    C.beginPath(); C.arc(0, -74, 14, 0, Math.PI*2); C.fill();
    C.strokeStyle = '#F57C00'; C.lineWidth = 1.5; C.stroke();
    C.fillStyle = '#5D4037';
    C.beginPath(); C.arc(0, -82, 11, Math.PI, 0, false); C.fill();
    C.fillStyle = '#333';
    C.beginPath(); C.arc(-5, -72, 2.5, 0, Math.PI*2); C.fill();
    C.beginPath(); C.arc( 5, -72, 2.5, 0, Math.PI*2); C.fill();
    C.strokeStyle = '#333'; C.lineWidth = 1.5;
    C.beginPath(); C.arc(0, -70, 5, 0.1, Math.PI - 0.1); C.stroke();
    C.restore();
}

function drawAnimals() {
    const emojis = ['🐰', '🦊', '🐃', '🐍'];
    const positions = [[90, 250], [210, 275], [450, 275], [570, 250]];
    C.font = '36px serif'; C.textAlign = 'center'; C.textBaseline = 'middle';
    emojis.forEach((e, i) => C.fillText(e, positions[i][0], positions[i][1]));
}

function drawCorrectOverlay() {
    drawStraightTracks(0); drawTrolleyBack();
    const cy = VP_Y + (CH - VP_Y) * 0.52;
    C.strokeStyle = 'rgba(0,200,83,0.35)'; C.lineWidth = 22;
    C.beginPath(); C.arc(VP_X, cy, 52, 0, Math.PI*2); C.stroke();
    C.strokeStyle = '#00C853'; C.lineWidth = 10;
    C.beginPath(); C.arc(VP_X, cy, 52, 0, Math.PI*2); C.stroke();
}

function drawBrokenOverlay() {
    const breakT = 0.52;
    const breakY = VP_Y + (CH - VP_Y) * breakT;
    const bLX    = VP_X - RAIL_W * breakT;
    const bRX    = VP_X + RAIL_W * breakT;

    C.fillStyle = '#B09464';
    C.beginPath();
    C.moveTo(VP_X-3, VP_Y+5); C.lineTo(VP_X+3, VP_Y+5);
    C.lineTo(bRX+20, breakY); C.lineTo(bLX-20, breakY);
    C.closePath(); C.fill();

    C.strokeStyle = '#7B5B3A'; C.lineCap = 'butt';
    for (let i = 1; i <= 4; i++) {
        const t  = breakT * (i / 5);
        const y  = VP_Y + (CH - VP_Y) * t;
        const lx = VP_X - RAIL_W * t;
        const rx = VP_X + RAIL_W * t;
        C.lineWidth = Math.max(1.5, 8 * t);
        C.beginPath(); C.moveTo(lx-4, y); C.lineTo(rx+4, y); C.stroke();
    }

    C.strokeStyle = '#C0C0C0'; C.lineWidth = 4; C.lineCap = 'round';
    C.beginPath(); C.moveTo(VP_X, VP_Y+2); C.lineTo(bLX, breakY); C.stroke();
    C.beginPath(); C.moveTo(VP_X, VP_Y+2); C.lineTo(bRX, breakY); C.stroke();

    C.strokeStyle = '#E53935'; C.lineWidth = 5; C.lineCap = 'round';
    C.beginPath(); C.moveTo(bLX, breakY); C.lineTo(bLX-22, breakY+32); C.stroke();
    C.beginPath(); C.moveTo(bRX, breakY); C.lineTo(bRX+22, breakY+32); C.stroke();
    C.strokeStyle = '#B71C1C'; C.lineWidth = 3;
    C.beginPath(); C.moveTo(bLX-4, breakY+5); C.lineTo(bLX-28, breakY+18); C.stroke();
    C.beginPath(); C.moveTo(bRX+4, breakY+5); C.lineTo(bRX+28, breakY+18); C.stroke();

    C.fillStyle = '#6D4C41';
    C.beginPath();
    C.moveTo(bLX-44, breakY+10); C.lineTo(bRX+44, breakY+10);
    C.lineTo(bRX+24, breakY+28); C.lineTo(bLX-24, breakY+28);
    C.closePath(); C.fill();

    const vg = C.createLinearGradient(0, breakY+28, 0, CH);
    vg.addColorStop(0, '#1A2332'); vg.addColorStop(1, '#000A14');
    C.fillStyle = vg; C.fillRect(0, breakY+28, CW, CH - breakY - 28);

    function dangerX(x, y) {
        C.strokeStyle = '#FF5252'; C.lineWidth = 4; C.lineCap = 'round';
        C.beginPath(); C.moveTo(x-9, y-9); C.lineTo(x+9, y+9); C.stroke();
        C.beginPath(); C.moveTo(x+9, y-9); C.lineTo(x-9, y+9); C.stroke();
    }
    dangerX(bLX-28, breakY - 18); dangerX(bRX+28, breakY - 18);

    function drawBoulder(cx, cy, rx, ry, angle, baseColor, hiColor) {
        C.save(); C.translate(cx, cy); C.rotate(angle);
        C.fillStyle = baseColor; C.strokeStyle = '#3D2D1A'; C.lineWidth = 2;
        C.beginPath(); C.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); C.fill(); C.stroke();
        C.fillStyle = hiColor;
        C.beginPath(); C.ellipse(-rx * 0.28, -ry * 0.32, rx * 0.32, ry * 0.22, -0.3, 0, Math.PI * 2); C.fill();
        C.restore();
    }
    const bldY = breakY - 10;
    drawBoulder(VP_X - 18, bldY,      32, 22, -0.18, '#7A6655', 'rgba(255,255,255,0.15)');
    drawBoulder(VP_X + 26, bldY + 6,  27, 18,  0.25, '#8A7260', 'rgba(255,255,255,0.12)');
    drawBoulder(VP_X - 52, bldY + 8,  20, 14,  0.10, '#6A5548', 'rgba(255,255,255,0.10)');
    drawBoulder(VP_X + 55, bldY + 2,  17, 12, -0.30, '#6F5E4E', 'rgba(255,255,255,0.10)');
    drawBoulder(VP_X +  4, bldY - 18, 14, 10,  0.05, '#7D6B5B', 'rgba(255,255,255,0.12)');

    drawTrolleyBack();
}

function drawScene() {
    C.clearRect(0, 0, CW, CH);
    drawBG();
    switch (canvasPhase) {
        case 'moving':
            drawStraightTracks(scrollOff % 1.0);
            drawTrolleyBack();
            break;
        case 'arrived':
            drawStraightTracks(0);
            drawTrolleyBack();
            drawAnimals();
            break;
        case 'correct':
            drawCorrectOverlay();
            break;
        case 'broken':
            drawBrokenOverlay();
            break;
    }
}

/* =============================================
   ANIMATION HELPERS
   ============================================= */
function stopScrollAnim() {
    if (scrollReqId) { cancelAnimationFrame(scrollReqId); scrollReqId = null; }
}

function startApproachAnim(onArrived) {
    canvasPhase = 'moving';
    scrollOff   = 0;
    let lastTime = null;
    startTrainSound();

    function step(now) {
        if (!lastTime) lastTime = now;
        const dt = (now - lastTime) / 1000;
        lastTime = now;
        scrollOff += SCROLL_SPEED * dt;
        drawScene();
        if (scrollOff < APPROACH_CYCLES) {
            scrollReqId = requestAnimationFrame(step);
        } else {
            scrollReqId = null;
            canvasPhase = 'arrived';
            drawScene();
            onArrived && onArrived();
        }
    }
    scrollReqId = requestAnimationFrame(step);
}

function startPostAnswerAnim(onDone) {
    canvasPhase = 'moving';
    let elapsed = 0, lastTime = null;
    const POST_DURATION = 0.65;

    function step(now) {
        if (!lastTime) lastTime = now;
        const dt = (now - lastTime) / 1000;
        lastTime = now;
        elapsed  += dt;
        scrollOff += SCROLL_SPEED * dt;
        drawScene();
        if (elapsed < POST_DURATION) {
            scrollReqId = requestAnimationFrame(step);
        } else {
            scrollReqId = null;
            stopTrainSound();
            onDone();
        }
    }
    scrollReqId = requestAnimationFrame(step);
}

/* =============================================
   SOUND
   ============================================= */
let audioCtx = null;
function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}
function playDing() {
    const a = getAudio();
    const osc = a.createOscillator(), g = a.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(659.25, a.currentTime);
    osc.frequency.setValueAtTime(523.25, a.currentTime + 0.15);
    g.gain.setValueAtTime(0.1, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.6);
    osc.connect(g); g.connect(a.destination);
    osc.start(); osc.stop(a.currentTime + 0.6);
}
function playBuzz() {
    const a = getAudio();
    const osc = a.createOscillator(), g = a.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(140, a.currentTime);
    g.gain.setValueAtTime(0.06, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.4);
    osc.connect(g); g.connect(a.destination);
    osc.start(); osc.stop(a.currentTime + 0.4);
}
let trainNoiseSource = null;
function startTrainSound() {
    stopTrainSound();
    try {
        const a = getAudio(), sr = a.sampleRate;
        const buf = a.createBuffer(1, sr, sr);
        const d   = buf.getChannelData(0);
        [0, 0.5].forEach(offset => {
            const si = Math.round(offset * sr), len = Math.round(sr * 0.055);
            for (let i = 0; i < len && si + i < sr; i++)
                d[si + i] += (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.012)) * 0.45;
        });
        for (let i = 0; i < sr; i++) d[i] += (Math.random() * 2 - 1) * 0.018;
        const src = a.createBufferSource();
        src.buffer = buf; src.loop = true;
        const lpf = a.createBiquadFilter();
        lpf.type = 'lowpass'; lpf.frequency.value = 450;
        const g = a.createGain(); g.gain.value = 0.32;
        src.connect(lpf); lpf.connect(g); g.connect(a.destination);
        src.start(); trainNoiseSource = src;
    } catch(e) {}
}
function stopTrainSound() {
    if (trainNoiseSource) { try { trainNoiseSource.stop(); } catch(e) {} trainNoiseSource = null; }
}

/* =============================================
   GAME STATE
   ============================================= */
const TOTAL_Q = 10;
let gs = {
    questions:     [],
    currentIndex:  0,
    score:         0,
    animalChoices: [],
    correctAnimal: -1,
    busy:          false,
};

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function showFeedback(emoji) {
    const el = document.getElementById('feedback-overlay');
    el.textContent = emoji; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 1400);
}

function setButtons(enabled) {
    for (let i = 0; i < 4; i++)
        document.getElementById('animal-btn-' + i).disabled = !enabled;
}

function renderQuestion(q) {
    function fmtSentence(s) {
        const blank = '<span class="blank-word">（　　　）</span>';
        let out = s.replace(/\( \[BLANK\] \)/g, blank);
        out = out.replace(/^([A-Z][a-z]*\s*[12]?\s*:\s*)/, '<span class="speaker">$1</span>');
        return out;
    }
    const html = q.sentences.map(s => `<div>${fmtSentence(s)}</div>`).join('');
    document.getElementById('question-text').innerHTML = html;
}

function setupQuestion() {
    const q = gs.questions[gs.currentIndex];
    const correct = q.choices[q.a - 1];
    const shuffled = shuffle([...q.choices]);
    gs.animalChoices = shuffled;
    gs.correctAnimal = shuffled.indexOf(correct);

    for (let i = 0; i < 4; i++)
        document.getElementById('animal-choice-' + i).textContent = shuffled[i];

    renderQuestion(q);
    document.getElementById('q-num').textContent = gs.currentIndex + 1;
    document.getElementById('answer-reveal').style.display = 'none';

    setButtons(false);
    stopScrollAnim();
    gamePhase = 'moving';

    startApproachAnim(() => {
        gamePhase = 'idle';
        setButtons(true);
    });
}

function chooseAnswer(idx) {
    if (gs.busy || gamePhase !== 'idle') return;
    gs.busy = true;
    setButtons(false);
    stopScrollAnim();

    const isCorrect = (idx === gs.correctAnimal);
    gamePhase = 'animating';

    startPostAnswerAnim(() => {
        if (isCorrect) {
            gs.score++;
            document.getElementById('score-display').textContent = gs.score;
            canvasPhase = 'correct';
            drawScene(); playDing(); showFeedback('⭕️');
            setTimeout(afterAnswer, 1400);
        } else {
            const correctWord = gs.animalChoices[gs.correctAnimal];
            const reveal = document.getElementById('answer-reveal');
            reveal.textContent = '✨ 正解は「' + correctWord + '」だよ！';
            reveal.style.display = 'block';
            canvasPhase = 'broken';
            drawScene(); playBuzz(); showFeedback('❌');
            setTimeout(afterAnswer, 2200);
        }
    });
}

function afterAnswer() {
    gs.currentIndex++; gs.busy = false; gamePhase = 'idle';
    if (gs.currentIndex >= gs.questions.length) setTimeout(showGameOver, 400);
    else setTimeout(setupQuestion, 350);
}

function showScreen(id) {
    ['screen-welcome', 'screen-game', 'screen-gameover'].forEach(sid =>
        document.getElementById(sid).style.display = (sid === id) ? 'flex' : 'none'
    );
}

function startGame() {
    stopTrainSound();
    gs.questions    = shuffle(quizData).slice(0, TOTAL_Q);
    gs.currentIndex = 0;
    gs.score        = 0;
    gs.busy         = false;
    document.getElementById('score-display').textContent = '0';
    document.getElementById('q-total').textContent       = TOTAL_Q;
    showScreen('screen-game');
    setupQuestion();
}

function showGameOver() {
    const s = gs.score, t = TOTAL_Q;
    document.getElementById('final-score').textContent = s;
    document.getElementById('final-total').textContent = t;
    let title, msg;
    if (s === t)          { title = '🎉 パーフェクト！ 🎉'; msg = '全問正解！すごすぎる！！'; }
    else if (s >= t * .8) { title = '🌟 すばらしい！';      msg = 'とてもよくできました！';  }
    else if (s >= t * .6) { title = '😊 よくできました！';   msg = 'なかなかじょうず！';     }
    else if (s >= t * .4) { title = '🌱 もう少し！';         msg = 'また挑戦してみよう！';   }
    else                  { title = '💪 がんばれ！';          msg = 'もう一度チャレンジ！';  }
    document.getElementById('gameover-title').textContent = title;
    document.getElementById('score-message').textContent  = msg;
    showScreen('screen-gameover');
}

canvasPhase = 'moving';
scrollOff = 0;
drawScene();
</script>
