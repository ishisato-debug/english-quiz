<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英検5級リーディング③</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            text-align: center;
            background-color: #fffaf0;
            background-image: radial-gradient(#ffdfba 1px, transparent 1px);
            background-size: 20px 20px;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ff69b4;
            font-size: 28px;
            text-shadow: 1px 1px white;
            margin-bottom: 10px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 5px solid #ffb6c1;
            border-radius: 40px;
            padding: 24px 20px 16px;
            box-shadow: 0 10px 0 #ffb6c1;
            max-width: 650px;
            margin: 0 auto;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 8px;
        }

        /* 日本語訳 */
        .japanese {
            font-size: 20px;
            color: #888;
            font-weight: normal;
            text-align: left;
            padding-bottom: 6px;
            border-bottom: 1px dashed #ffb6c1;
        }

        /* 並べ替え用の単語リスト */
        .words-list {
            font-size: 20px;
            font-weight: bold;
            text-align: left;
            line-height: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 20px;
            padding: 8px 0;
        }
        .words-list .word-item {
            white-space: nowrap;
        }
        .word-num {
            color: #ff69b4;
            font-weight: bold;
        }

        /* 文の構造（空欄＋前後の固定語） */
        .sentence-structure {
            font-size: 24px;
            font-weight: bold;
            text-align: left;
            line-height: 1;
            display: flex;
            flex-wrap: nowrap;
            align-items: flex-end;
            gap: 8px;
            padding: 12px 0;
        }
        .fixed-word {
            white-space: nowrap;
        }
        .blank-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .blank-label {
            font-size: 12px;
            color: #ff69b4;
            font-weight: bold;
            line-height: 1;
        }
        .blank-box {
            display: block;
            width: 60px;
            height: 36px;
            border: 2.5px solid #333;
            border-radius: 4px;
        }
        .blank-box-plain {
            display: block;
            width: 60px;
            height: 36px;
            border: 2.5px solid #333;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* フィードバック */
        #feedback {
            font-size: 70px;
            height: 80px;
            line-height: 1;
        }

        /* 選択肢ボタン */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 420px;
            margin: 0 auto;
        }
        .choice-btn {
            padding: 12px 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 20px;
            color: white;
            box-shadow: 0 6px #999;
            transition: 0.1s;
        }
        .choice-btn:active {
            box-shadow: none;
            transform: translateY(6px);
        }
        .btn-1 { background-color: #ff9d00; }
        .btn-2 { background-color: #4db8ff; }
        .btn-3 { background-color: #c780ff; }
        .btn-4 { background-color: #ff6666; }

        /* ナビゲーション */
        .nav-area {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .nav-speak {
            text-align: center;
            margin-bottom: 8px;
        }
        .home-area {
            text-align: center;
            margin-top: 20px;
        }
        .nav-btn {
            padding: 10px 18px;
            font-size: 17px;
            cursor: pointer;
            background-color: #fff;
            border: 2px solid #ffb6c1;
            border-radius: 15px;
            color: #ff69b4;
            font-weight: bold;
        }
        #restart-btn {
            display: none;
            margin-top: 8px;
            padding: 12px 28px;
            font-size: 20px;
            cursor: pointer;
            background-color: #ff69b4;
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            box-shadow: 0 6px #c94f8a;
        }
        #restart-btn:active {
            box-shadow: none;
            transform: translateY(6px);
        }
    </style>
</head>
<body>

    <h1>✨ 英検5級リーディング③ ✨</h1>

    <div class="card">
        <div class="japanese" id="japanese"></div>
        <div class="words-list" id="words-list"></div>
        <div class="sentence-structure" id="sentence-structure"></div>
        <div id="feedback"></div>

        <div class="btn-group">
            <button class="choice-btn btn-1" onclick="check(1)">1</button>
            <button class="choice-btn btn-2" onclick="check(2)">2</button>
            <button class="choice-btn btn-3" onclick="check(3)">3</button>
            <button class="choice-btn btn-4" onclick="check(4)">4</button>
        </div>

        <div class="nav-speak"><button class="nav-btn" onclick="speak()">🔊 おんせい</button></div>
        <div class="nav-area">
            <button class="nav-btn" onclick="prevQuestion()">🔙 まえへ</button>
            <button class="nav-btn" onclick="nextQuestion()">つぎへ 🔜</button>
        </div>
        <div style="color: #ff69b4; font-weight: bold; margin-top: 4px;">あと <span id="remaining">0</span> もん</div>
        <button id="restart-btn" onclick="restart()">🔄 さいしょにもどる</button>
    </div>
    <div class="home-area">
        <button class="nav-btn" onclick="location.href='index.html'">🏠 ホーム</button>
    </div>

    <script>
        // 問題データ（英検5級 過去問3回分 5ページ 並べ替え問題）
        const quizData = [
            // ── 第3回 ──
            { japanese: 'これらの靴はいくらですか。', words: ['are', 'how', 'much', 'these shoes'], prefix: '', suffix: '?', correctSentence: 'How much are these shoes?', a: 3, choices: ['③ ─ ②', '③ ─ ④', '② ─ ①', '② ─ ③'] },
            { japanese: 'この写真の中の女の子はだれですか。', words: ['the girl', 'in', 'who', 'is'], prefix: '', suffix: 'this photo?', correctSentence: 'Who is the girl in this photo?', a: 2, choices: ['④ ─ ②', '③ ─ ①', '③ ─ ④', '② ─ ①'] },
            { japanese: '明日のピクニックに、私たちは何が必要ですか。', words: ['we', 'for', 'need', 'do'], prefix: 'What', suffix: 'the picnic tomorrow?', correctSentence: 'What do we need for the picnic tomorrow?', a: 2, choices: ['① ─ ②', '④ ─ ③', '③ ─ ①', '② ─ ④'] },
            { japanese: 'トムのお父さんは大学で何を教えていますか。', words: ['does', 'what', 'teach', "Tom's father"], prefix: '', suffix: 'at college?', correctSentence: "What does Tom's father teach at college?", a: 3, choices: ['④ ─ ①', '③ ─ ②', '② ─ ④', '② ─ ③'] },
            { japanese: '私は浩のために朝食を作っています。', words: ['for', 'breakfast', 'am', 'cooking'], prefix: 'I', suffix: 'Hiroshi.', correctSentence: 'I am cooking breakfast for Hiroshi.', a: 1, choices: ['③ ─ ②', '② ─ ④', '③ ─ ①', '④ ─ ②'] },
            // ── 第2回 ──
            { japanese: 'これは私の姉のピアノです。', words: ['this', "sister's", 'my', 'is'], prefix: '', suffix: 'piano.', correctSentence: "This is my sister's piano.", a: 1, choices: ['① ─ ③', '③ ─ ②', '① ─ ②', '② ─ ③'] },
            { japanese: '私は朝、歩いて学校へ行きます。', words: ['to', 'school', 'walk', 'in'], prefix: 'I', suffix: 'the morning.', correctSentence: 'I walk to school in the morning.', a: 4, choices: ['① ─ ②', '④ ─ ③', '② ─ ①', '③ ─ ②'] },
            { japanese: 'キムは居間でテレビを見ていますか。', words: ['watching', 'Kim', 'in', 'TV'], prefix: 'Is', suffix: 'the living room?', correctSentence: 'Is Kim watching TV in the living room?', a: 2, choices: ['① ─ ④', '② ─ ④', '③ ─ ②', '③ ─ ①'] },
            { japanese: 'ナンシー、あなたのクラスで誰が英語を上手に話せますか。', words: ['can', 'who', 'speak', 'English'], prefix: 'Nancy,', suffix: 'well in your class?', correctSentence: 'Nancy, who can speak English well in your class?', a: 4, choices: ['③ ─ ④', '① ─ ③', '② ─ ①', '② ─ ③'] },
            { japanese: '私の父は毎朝３キロ走ります。', words: ['every', 'three kilometers', 'my father', 'runs'], prefix: '', suffix: 'morning.', correctSentence: 'My father runs three kilometers every morning.', a: 3, choices: ['① ─ ④', '① ─ ③', '③ ─ ②', '③ ─ ①'] },
            // ── 第1回 ──
            { japanese: 'その花屋は毎日10時に開きます。', words: ['opens', "ten o'clock", 'the flower shop', 'at'], prefix: '', suffix: 'every day.', correctSentence: "The flower shop opens at ten o'clock every day.", a: 2, choices: ['③ ─ ①', '③ ─ ④', '④ ─ ②', '④ ─ ①'] },
            { japanese: 'ジュリア、あなたは今何をしていますか。', words: ['you', 'doing', 'are', 'what'], prefix: 'Julia,', suffix: 'now?', correctSentence: 'Julia, what are you doing now?', a: 3, choices: ['① ─ ③', '③ ─ ②', '④ ─ ①', '② ─ ①'] },
            { japanese: '今日は私たちの修学旅行の初日です。', words: ['of', 'is', 'the first day', 'today'], prefix: '', suffix: 'our school trip.', correctSentence: 'Today is the first day of our school trip.', a: 4, choices: ['① ─ ②', '① ─ ③', '④ ─ ②', '④ ─ ③'] },
            { japanese: '私の叔母はロンドンに住んでいます。', words: ['my aunt', 'London', 'lives', 'in'], prefix: '', suffix: '.', correctSentence: 'My aunt lives in London.', a: 2, choices: ['② ─ ①', '① ─ ④', '③ ─ ②', '① ─ ③'] },
            { japanese: 'あなたの妹さんは毎年スキーに行きますか。', words: ['go', 'does', 'your sister', 'skiing'], prefix: '', suffix: 'every year?', correctSentence: 'Does your sister go skiing every year?', a: 1, choices: ['② ─ ①', '③ ─ ④', '④ ─ ③', '③ ─ ①'] },
        ];

        const circled = ['①', '②', '③', '④'];

        // N問ランダム抽出
        function shuffleAndPick(array, n) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr.slice(0, n);
        }

        let shuffledData = shuffleAndPick(quizData, 5);
        let currentIndex = 0;

        function playDingDong() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(659.25, ctx.currentTime);
            osc.frequency.setValueAtTime(523.25, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        }

        function playBubu() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(110, ctx.currentTime);
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
        }

        function updateDisplay() {
            const q = shuffledData[currentIndex];

            // 日本語
            document.getElementById('japanese').textContent = q.japanese;

            // 単語リスト ①〜④
            const wordsHtml = q.words.map((w, i) =>
                `<span class="word-item"><span class="word-num">${circled[i]}</span> ${w}</span>`
            ).join('');
            document.getElementById('words-list').innerHTML = wordsHtml;

            // 文の構造（前置語 + 空欄4つ + 後置語）
            let structureHtml = '';
            if (q.prefix) {
                structureHtml += `<span class="fixed-word">${q.prefix}</span>`;
            }
            // 1番目（ラベルつき）、2番目、3番目（ラベルつき）、4番目
            const labels = ['1番目', '', '3番目', ''];
            for (let i = 0; i < 4; i++) {
                if (labels[i]) {
                    structureHtml += `<span class="blank-group"><span class="blank-label">${labels[i]}</span><span class="blank-box">&nbsp;</span></span>`;
                } else {
                    structureHtml += `<span class="blank-box-plain">&nbsp;</span>`;
                }
            }
            if (q.suffix) {
                structureHtml += `<span class="fixed-word">${q.suffix}</span>`;
            }
            document.getElementById('sentence-structure').innerHTML = structureHtml;

            // フィードバックリセット
            document.getElementById('feedback').innerText = '';
            document.getElementById('remaining').innerText = shuffledData.length - currentIndex - 1;
            document.getElementById('restart-btn').style.display = 'none';

            // ボタンラベル（1番目 ─ 3番目 の組合せ）
            const buttons = document.querySelectorAll('.choice-btn');
            for (let i = 0; i < 4; i++) {
                buttons[i].innerHTML = `${i + 1}.&nbsp;${q.choices[i]}`;
            }
        }

        function check(choice) {
            const q = shuffledData[currentIndex];
            const feedbackEl = document.getElementById('feedback');
            if (choice === q.a) {
                playDingDong();
                feedbackEl.innerText = '⭕️';
                feedbackEl.style.color = '#ff1493';
            } else {
                playBubu();
                feedbackEl.innerText = '❌';
                feedbackEl.style.color = '#1e90ff';
            }
        }

        function nextQuestion() {
            if (currentIndex < shuffledData.length - 1) {
                currentIndex++;
                updateDisplay();
            } else {
                document.getElementById('feedback').innerText = '🎉';
                document.getElementById('remaining').innerText = '0';
                document.getElementById('restart-btn').style.display = 'inline-block';
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        function restart() {
            shuffledData = shuffleAndPick(quizData, 5);
            currentIndex = 0;
            updateDisplay();
        }

        function speak() {
            const q = shuffledData[currentIndex];
            const utterance = new SpeechSynthesisUtterance(q.correctSentence);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        updateDisplay();
    </script>
</body>
</html>
