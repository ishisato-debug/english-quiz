<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>えいごクイズ</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            text-align: center;
            background-color: #fffaf0;
            background-image: radial-gradient(#ffdfba 1px, transparent 1px);
            background-size: 20px 20px;
            color: #333;
            margin: 0;
            padding: 10px;
        }
        h1 { color: #ff69b4; font-size: 24px; margin-bottom: 10px; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 5px solid #ffb6c1;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 10px 0 #ffb6c1;
            max-width: 900px;
            margin: 0 auto;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .sentence-box {
            font-size: clamp(20px, 5vw, 32px);
            font-weight: bold;
            line-height: 2.2;
            margin: 20px 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .sentence-unit {
            display: block;
            word-break: keep-all;
            overflow-wrap: break-word;
            margin: 6px 0;
            max-width: 100%;
        }
        /* 空欄（カッコ）だけは絶対に分割しない */
        .blank-wrapper {
            color: #ff1493;
            margin: 0 6px;
            display: inline-block;
            white-space: nowrap;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .choice-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }
        .choice-btn {
            padding: 15px 0;
            width: 100px;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            color: white;
            box-shadow: 0 6px #999;
            transition: 0.1s;
        }
        .choice-btn:active { box-shadow: none; transform: translateY(6px); }
        .am { background-color: #ff9d00; }
        .is { background-color: #4db8ff; }
        .are { background-color: #c780ff; }

        .voice-btn {
            background-color: #ffefd5;
            border: 3px solid #ffa500;
            border-radius: 50px;
            padding: 10px 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: #d2691e;
        }

        .nav-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }
        .nav-btn {
            padding: 10px 14px;
            background-color: #fff;
            border: 2px solid #ffb6c1;
            border-radius: 15px;
            color: #ff69b4;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        #feedback { font-size: 70px; height: 80px; margin-top: 5px; }

        .clear-msg { font-size: 36px; color: #ff1493; margin-bottom: 20px; font-weight: bold; }
        .reset-btn {
            padding: 18px 36px;
            font-size: 22px;
            font-weight: bold;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px #d14789;
        }
        .reset-btn:active { box-shadow: none; transform: translateY(6px); }
    </style>
</head>
<body>

    <h1>✨ am, is, are ? ✨</h1>

    <div id="quiz-area">
        <div class="card" id="card-content">
            <div id="sentence" class="sentence-box"></div>
            <div class="btn-group" id="controls">
                <div class="choice-container">
                    <button class="choice-btn am" onclick="check('am')">am</button>
                    <button class="choice-btn is" onclick="check('is')">is</button>
                    <button class="choice-btn are" onclick="check('are')">are</button>
                </div>
                <button class="voice-btn" onclick="repeatVoice()">🔊 おんせい</button>
                <div id="feedback"></div>
            </div>
        </div>
        <div class="nav-container" id="nav-bar">
            <button class="nav-btn" onclick="prevQuestion()">🔙 まえに もどる</button>
            <button class="nav-btn" onclick="nextQuestion()">つぎへ すすむ 🔜</button>
        </div>
        <div id="footer-info" style="margin-top: 10px; color: #ff69b4; font-weight: bold;">あと <span id="remaining">0</span> もん</div>
    </div>
    <div style="text-align:center; margin-top:20px;">
        <button class="nav-btn" onclick="location.href='index.html'">🏠 ホーム</button>
    </div>

    <script>
        const characters = ['Sena', 'Riho', 'Hana', 'Miona', 'Sou', 'Sosuke', 'Sota', 'Itsuki', 'Odai', 'Ruki', 'Haru', 'Sara', 'Allen'];
        const msNames = ['Ms. Nene', 'Ms. Mika', 'Ms. Nodoka'];
        let quizList = [];
        let currentIndex = 0;

        function pickRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }
        function pickTwoDifferent(arr) {
            const shuffled = [...arr].sort(() => Math.random() - 0.5);
            return [shuffled[0], shuffled[1]];
        }

        // PDFの例文をもとにしたテンプレート（p = be動詞の後ろに続く語句）
        const templates = [
            // is: Ms.名前が主語（文脈的に大人が主語の文）
            { type: 'ms', a: 'is', p: 'an art teacher.' },           // kakomon第3回: Mr. Yamada
            { type: 'ms', a: 'is', p: 'a music teacher.' },          // kakomon2第2回: Mr. Brown
            { type: 'ms', a: 'is', p: 'a doctor. She works at a hospital.' },
            // is: 13人の登場人物が主語（子供・若者向けの文）
            { type: 'single', a: 'is', p: 'a musician.' },               // kakomon3第1回: Henry
            { type: 'single', a: 'is', p: 'a junior high school student.' }, // kakomon2第2回: Jack
            { type: 'single', a: 'is', p: 'in the gym.' },               // kakomon3第1回
            { type: 'single', a: 'is', p: 'in the science club.' },
            { type: 'single', a: 'is', p: 'on the volleyball team.' },   // kakomon第3回: Fred's brother
            { type: 'single', a: 'is', p: 'Canadian.' },                 // kakomon第3回: Steve
            { type: 'single', a: 'is', p: 'from Australia.' },
            { type: 'single', a: 'is', p: 'a high school student.' },
            // are: 2人の名前が主語 ─ PDFの例文から
            { type: 'pair', a: 'are', p: 'good friends. They like tennis.' }, // kakomon第3回: Keiko and Megumi
            { type: 'pair', a: 'are', p: 'classmates.' },
            { type: 'pair', a: 'are', p: 'from Canada.' },                // kakomon3第1回: Tim and Lucy
            { type: 'pair', a: 'are', p: 'friends.' },
            // am: Iが主語 ─ PDFの例文から
            { type: 'fixed', s: 'I', a: 'am', p: 'from Australia. How about you?', full: 'I am from Australia. How about you?' },
            { type: 'fixed', s: 'I', a: 'am', p: 'very busy from Monday to Friday.', full: 'I am very busy from Monday to Friday.' }, // kakomon第3回
            // are: Youが主語
            { type: 'fixed', s: 'You', a: 'are', p: 'hungry.', full: 'You are hungry.' },
            { type: 'fixed', s: 'You', a: 'are', p: 'Canadian.', full: 'You are Canadian.' },
            // He / She (ランダム)
            { type: 'he_she', a: 'is', p: 'in the gym.' },
            { type: 'he_she', a: 'is', p: 'a musician.' },
            { type: 'he_she', a: 'is', p: 'on the volleyball team.' },
            { type: 'he_she', a: 'is', p: 'Canadian.' },
            // They
            { type: 'they', a: 'are', p: 'classmates.' },
            { type: 'they', a: 'are', p: 'from Canada.' },
            { type: 'they', a: 'are', p: 'good friends.' },
            // 疑問文（areが先頭）
            { type: 'fixed', s: '', a: 'are', p: 'you Canadian? Yes, I am.', q: true, full: 'Are you Canadian? Yes, I am.' }, // kakomon第3回
        ];

        function buildQuizItem(t) {
            if (t.type === 'single') {
                const name = pickRandom(characters);
                return { s: name, a: t.a, p: t.p, full: `${name} ${t.a} ${t.p}` };
            } else if (t.type === 'ms') {
                const ms = pickRandom(msNames);
                return { s: ms, a: t.a, p: t.p, full: `${ms} ${t.a} ${t.p}` };
            } else if (t.type === 'pair') {
                const [n1, n2] = pickTwoDifferent(characters);
                const s = `${n1} and ${n2}`;
                return { s, a: t.a, p: t.p, full: `${s} ${t.a} ${t.p}` };
            } else if (t.type === 'he_she') {
                const pron = Math.random() < 0.5 ? 'He' : 'She';
                return { s: pron, a: t.a, p: t.p, full: `${pron} ${t.a} ${t.p}` };
            } else if (t.type === 'they') {
                return { s: 'They', a: t.a, p: t.p, full: `They ${t.a} ${t.p}` };
            } else {
                return { s: t.s, a: t.a, p: t.p, q: t.q, full: t.full };
            }
        }

        // AudioContextをグローバルで1つだけ保持（iOS対応）
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // iOSではユーザー操作後にresumeが必要
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playDingDong() {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(659.25, ctx.currentTime);
            osc.frequency.setValueAtTime(523.25, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        }

        function playBubu() {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(140, ctx.currentTime);
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        }

        function initQuiz() {
            currentIndex = 0;
            // テンプレートから全問を生成し、ランダムに10問選ぶ
            const allItems = templates.map(buildQuizItem);
            allItems.sort(() => Math.random() - 0.5);
            quizList = allItems.slice(0, 10);
            updateDisplay();
        }

        function updateDisplay() {
            const card = document.getElementById('card-content');
            const nav = document.getElementById('nav-bar');
            const footer = document.getElementById('footer-info');

            if (currentIndex >= quizList.length) {
                card.innerHTML = `
                    <div class="sentence-box">
                        <div class="clear-msg">🌟 よくできました 🌟</div>
                        <button class="reset-btn" onclick="location.reload()">もういちど あそぶ</button>
                    </div>
                `;
                nav.style.display = 'none';
                footer.style.display = 'none';
                return;
            }

            const q = quizList[currentIndex];
            const blank = `<span class="blank-wrapper">(&nbsp;&nbsp;&nbsp;)</span>`;
            let rawText = q.q ? `${blank} ${q.p}` : `${q.s} ${blank} ${q.p}`;

            // Ms./Mr.などの略語ピリオドを一時退避してから文分割
            const escaped = rawText.replace(/\b(Ms|Mr|Mrs|Dr)\./g, '$1\u2024');
            const sentences = escaped.match(/[^.!?]*[.!?]+/g) || [escaped];
            const html = sentences
                .map(s => s.replace(/\u2024/g, '.').trim())
                .filter(s => s.length > 0)
                .map(s => `<span class="sentence-unit">${s}</span>`)
                .join('');

            document.getElementById('sentence').innerHTML = html;
            document.getElementById('feedback').innerText = '';
            document.getElementById('remaining').innerText = quizList.length - currentIndex;
        }

        function check(choice) {
            const q = quizList[currentIndex];
            const f = document.getElementById('feedback');
            if (choice === q.a) {
                playDingDong();
                f.innerText = '⭕️'; f.style.color = 'red';
            } else {
                playBubu();
                f.innerText = '❌'; f.style.color = 'blue';
            }
        }

        function nextQuestion() {
            if (currentIndex < quizList.length) { currentIndex++; updateDisplay(); }
        }
        function prevQuestion() {
            if (currentIndex > 0) { currentIndex--; updateDisplay(); }
        }

        function repeatVoice() {
            window.speechSynthesis.cancel();
            const text = quizList[currentIndex].full.replace(/\bMiona\b/g, 'Meeona');
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        initQuiz();
    </script>
</body>
</html>
